<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="register.title">Регистрация - Менеджер Команд</title>
    <meta name="title-key" content="register.title">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/modern-ui.css">
    <style>
        :root { color-scheme: light; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body class="modern-theme min-h-screen">
    <nav class="modern-navbar">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <a href="/" class="text-xl font-bold modern-brand" data-translate="nav.title">Менеджер Команд</a>
                </div>
                <div class="flex items-center space-x-6">
                    <div id="languageSwitcher"></div>
                    <a href="/login" class="modern-nav-link transition-colors" data-translate="nav.login">Войти</a>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto auth-shell p-6">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold modern-title mb-2" data-translate="register.heading">Регистрация</h1>
                <p class="modern-muted" data-translate="register.subtitle">Создайте аккаунт для управления командами</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium modern-muted mb-2" data-translate="register.name">
                        Имя
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        required
                        placeholder="Введите ваше имя"
                        data-translate="register.name_placeholder"
                        class="modern-input px-3 py-2"
                    />
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium modern-muted mb-2" data-translate="register.email">
                        Email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        placeholder="Введите ваш email"
                        data-translate="register.email_placeholder"
                        class="modern-input px-3 py-2"
                    />
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium modern-muted mb-2" data-translate="register.password">
                        Пароль
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        minlength="6"
                        placeholder="Введите пароль (минимум 6 символов)"
                        data-translate="register.password_placeholder"
                        class="modern-input px-3 py-2"
                    />
                </div>

                <button 
                    type="submit" 
                    class="w-full modern-btn modern-btn-primary py-2 px-4"
                    data-translate="register.register_button"
                >
                    Зарегистрироваться
                </button>
            </form>

            <div class="mt-4 text-center">
                <p class="modern-muted">
                    <span data-translate="register.have_account">Уже есть аккаунт?</span> 
                    <a href="/login" class="modern-nav-link" data-translate="register.login_link">Войти</a>
                </p>
            </div>

            <div id="loading" class="hidden text-center py-4">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="mt-2 modern-muted" data-translate="register.registering">Регистрация...</p>
            </div>

            <div id="error" class="hidden mt-4 p-4 modern-alert">
                <p class="text-red-800" id="errorMessage"></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                password: formData.get('password')
            };

            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.token) {
                    localStorage.setItem('auth_token', result.token);
                    localStorage.setItem('user_info', JSON.stringify(result.user));
                    window.location.href = '/academy';
                } else {
                    const errorMessage = result.error || (window.translationManager ? window.translationManager.t('register.register_error') : 'Ошибка регистрации');
                    throw new Error(errorMessage);
                }
            } catch (error) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('errorMessage').textContent = error.message;
            }
        });
    </script>
    <script src="/js/translations.js"></script>
</body>
</html>
