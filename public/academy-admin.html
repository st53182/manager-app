<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Academy — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/modern-ui.css">
  <style>
        :root { color-scheme: dark; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="modern-theme text-slate-900 min-h-screen">
  <div id="gate" class="hidden max-w-md mx-auto px-4 py-24 text-center">
    <div class="modern-card p-8">
      <p class="modern-muted mb-4">Требуется вход администратора.</p>
      <a href="/login" class="modern-btn modern-btn-primary inline-block">Войти</a>
      <a href="/academy" class="block mt-4 modern-nav-link">← Workspace</a>
    </div>
  </div>

  <div id="denied" class="hidden max-w-md mx-auto px-4 py-24 text-center">
    <div class="modern-card p-8">
      <p class="text-red-400 mb-4">Доступ только для администратора.</p>
      <a href="/academy" class="modern-nav-link">В Workspace</a>
    </div>
  </div>

  <div id="app" class="hidden container mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-2xl font-semibold modern-title">Admin · AI Academy</h1>
      <div class="flex items-center gap-3">
        <div id="languageSwitcher"></div>
        <a href="/academy" class="text-sm modern-nav-link">← Workspace</a>
      </div>
    </div>

    <section class="mb-10 modern-card p-5">
      <h2 class="text-lg font-medium mb-4 modern-title">Пользователи</h2>
      <div class="overflow-x-auto rounded-xl border border-slate-200 bg-white/5">
        <table class="min-w-full text-sm text-left">
          <thead class="bg-white/5 text-slate-600">
            <tr>
              <th class="px-3 py-2">Email</th>
              <th class="px-3 py-2">Роль</th>
              <th class="px-3 py-2">Активен</th>
              <th class="px-3 py-2">Лимит день</th>
              <th class="px-3 py-2">Лимит месяц</th>
              <th class="px-3 py-2">Модели</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody id="userRows"></tbody>
        </table>
      </div>
    </section>

    <section class="mb-10 modern-card p-5">
      <h2 class="text-lg font-medium mb-4 modern-title">Чаты</h2>
      <div class="flex gap-2 mb-3">
        <input id="filterUserId" type="text" placeholder="User UUID (фильтр)" class="modern-input px-3 py-2 text-sm flex-1 max-w-md" />
        <button type="button" id="reloadChats" class="modern-btn modern-btn-secondary text-sm">Обновить</button>
      </div>
      <ul id="chatList" class="space-y-2 text-sm"></ul>
    </section>

    <section class="mb-10 modern-card p-5">
      <h2 class="text-lg font-medium mb-4 modern-title">Usage · экспорт</h2>
      <div class="flex flex-wrap gap-2 items-center">
        <input id="usageStart" type="date" class="modern-input px-3 py-2 text-sm" />
        <input id="usageEnd" type="date" class="modern-input px-3 py-2 text-sm" />
        <a id="exportCsv" href="#" class="modern-btn modern-btn-primary text-sm">Скачать CSV</a>
      </div>
      <pre id="usageSummary" class="mt-4 text-xs text-slate-700 overflow-auto max-h-64 bg-black/20 rounded-xl p-4 border border-slate-200/30"></pre>
    </section>
  </div>

  <script src="/js/translations.js"></script>
  <script type="module" src="/js/academy-admin.js"></script>
</body>
</html>
